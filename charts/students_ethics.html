
<section class="ethik-chart-section" aria-label="Ethisches Selbstverständnis von Ingenieuren">

  <style>
      .ethik-chart-section {
          --c-no:           var(--accent);         /* rot  */
          --c-rather-no:    #e07060;               /* kein direktes Äquivalent */
          --c-somewhat-no:  #e8a898;
         --c-somewhat-yes: var(--teal-light);
          --c-rather-yes:   var(--teal);
          --c-yes:          var(--purple);         /* dunkelste Zustimmung */
         --c-no-answer:    var(--rule);

         --font-main:  'Source Serif 4', Georgia, serif;  /* Body-Schrift */
        --font-label: 'DM Sans', sans-serif;             /* UI-Schrift   */
      }
      /* Layout */
      --bar-height:      28px;
      --label-width:     320px;
      --chart-gap:       10px;
      --row-gap:         14px;

      font-family: var(--font-main);
      max-width: 900px;
      margin: 4rem auto;
      padding: 0 1.5rem;
    }

    /* ── Titel & Untertitel ───────────────────────────────────────────────── */
    .ethik-chart-section .chart-title {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.25rem;
      color: inherit;          /* ← übernimmt deine Seitenfarbe */
    }
    .ethik-chart-section .chart-subtitle {
      font-size: 0.82rem;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    /* ── Legende ──────────────────────────────────────────────────────────── */
    .ethik-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.78rem;
    }
    .ethik-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ethik-legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Chart-Zeilen ─────────────────────────────────────────────────────── */
    .ethik-chart-rows {
      display: flex;
      flex-direction: column;
      gap: var(--row-gap);
    }
    .ethik-row {
      display: grid;
      grid-template-columns: var(--label-width) 1fr;
      gap: var(--chart-gap);
      align-items: center;

      /* Scrollytelling: Zeilen starten unsichtbar */
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .ethik-row.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ethik-row-label {
      font-size: 0.80rem;
      line-height: 1.35;
      text-align: right;
      padding-right: 0.5rem;
      color: inherit;
      opacity: 0.85;
    }

    /* ── Stacked bar ──────────────────────────────────────────────────────── */
    .ethik-bar {
      display: flex;
      height: var(--bar-height);
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
    }
    .ethik-bar-segment {
      height: 100%;
      width: 0%;                         /* animiert von JS auf echten Wert   */
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .ethik-bar-segment:hover::after {
      content: attr(data-label) ': ' attr(data-pct) '%';
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.82);
      color: #fff;
      font-size: 0.72rem;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 10;
    }

    /* ── X-Achse ──────────────────────────────────────────────────────────── */
    .ethik-axis {
      display: grid;
      grid-template-columns: var(--label-width) 1fr;
      gap: var(--chart-gap);
      margin-top: 6px;
      font-size: 0.72rem;
      font-family: var(--font-label);
      opacity: 0.5;
    }
    .ethik-axis-ticks {
      display: flex;
      justify-content: space-between;
    }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .ethik-chart-section {
        --label-width: 100%;
      }
      .ethik-row {
        grid-template-columns: 1fr;
      }
      .ethik-row-label {
        text-align: left;
        padding-right: 0;
        padding-bottom: 4px;
      }
    }
  </style>

  <!-- Titel -->
  <p class="chart-title">
    Das Bild des Ingenieurs und sein ethisches Selbstverständnis<br>
    aus der Sicht der Studierenden
  </p>
  <p class="chart-subtitle">Stichprobenumfang: 117 Befragte </p>

  <!-- Legende -->
  <div class="ethik-legend" id="ethikLegend"></div>

  <!-- Balkendiagramm -->
  <div class="ethik-chart-rows" id="ethikChart" role="list"></div>

  <!-- Achse -->
  <div class="ethik-axis">
    <div></div>
    <div class="ethik-axis-ticks">
      <span>0 %</span><span>25 %</span><span>50 %</span><span>75 %</span><span>100 %</span>
    </div>
  </div>

  <script>
  (function initEthikChart() {

    /*  1. Farbpalette & Kategorien  */

    const CATEGORIES = [
      { key: 'no',           label: 'trifft nicht zu',        color: 'var(--c-no)'          },
      { key: 'rather_no',    label: 'trifft weniger zu',      color: 'var(--c-rather-no)'   },
      { key: 'somewhat_no',  label: 'trifft eher weniger zu', color: 'var(--c-somewhat-no)' },
      { key: 'somewhat_yes', label: 'trifft etwas zu',        color: 'var(--c-somewhat-yes)'},
      { key: 'rather_yes',   label: 'trifft größtenteils zu', color: 'var(--c-rather-yes)'  },
      { key: 'yes',          label: 'trifft voll zu',         color: 'var(--c-yes)'         },
      { key: 'none',         label: 'keine Antwort',          color: 'var(--c-no-answer)'   },
    ];

    /*  2. Datensätze  */

    const ROWS = [
      {
        label: 'Ethik bietet für mich eine Orientierung für mein Handeln.',
        values: { no: 6, rather_no: 6, somewhat_no: 12, somewhat_yes: 29, rather_yes: 34, yes: 12, none: 1 },
      },
      {
        label: 'Ich habe kein Interesse mich mit ethischen Fragen zu beschäftigen.',
        values: { no: 18, rather_no: 26, somewhat_no: 26, somewhat_yes: 15, rather_yes: 8, yes: 7, none: 0 },
      },
      {
        label: 'Ein Ingenieur sollte durch sein Handeln eine Vorbildrolle einnehmen.',
        values: { no: 2, rather_no: 3, somewhat_no: 5, somewhat_yes: 26, rather_yes: 39, yes: 24, none: 1 },
      },
      {
        label: 'Ein Ingenieur soll immer das Allgemeinwohl berücksichtigen.',
        values: { no: 1, rather_no: 7, somewhat_no: 8, somewhat_yes: 22, rather_yes: 41, yes: 20, none: 2 },
      },
      {
        label: 'Ein Ingenieur soll immer nach ethischen Grundzügen handeln.',
        values: { no: 3, rather_no: 9, somewhat_no: 13, somewhat_yes: 19, rather_yes: 39, yes: 15, none: 2 },
      },
      {
        label: 'Erst ein erfahrener Ingenieur kann ethisch handeln.',
        values: { no: 26, rather_no: 23, somewhat_no: 17, somewhat_yes: 13, rather_yes: 9, yes: 12, none: 1 },
      },
      {
        label: 'Ingenieure und Ingenieurinnen urteilen bei ethischen Fragen gleich.',
        values: { no: 15, rather_no: 29, somewhat_no: 13, somewhat_yes: 13, rather_yes: 20, yes: 6, none: 5 },
      },
      {
        label: 'Ein Ingenieur ist nur seinem Arbeitgeber gegenüber verpflichtet.',
        values: { no: 22, rather_no: 33, somewhat_no: 19, somewhat_yes: 14, rather_yes: 9, yes: 2, none: 2 },
      },
      {
        label: 'Ein Ingenieur ist für den ethisch vertretbaren Gebrauch seiner Erfindung verantwortlich.',
        values: { no: 9, rather_no: 8, somewhat_no: 13, somewhat_yes: 20, rather_yes: 29, yes: 21, none: 1 },
      },
      {
        label: 'Erkennt ein Ingenieur eine Gefahr, muss er sie melden, auch wenn diese nicht in seinem Aufgabengebiet liegt.',
        values: { no: 4, rather_no: 6, somewhat_no: 10, somewhat_yes: 18, rather_yes: 28, yes: 30, none: 4 },
      },
      {
        label: 'Erkennt ein Ingenieur eine Unregelmäßigkeit oder einen Fehler, muss er sie melden, auch wenn sie seinen Auftraggeber betrifft.',
        values: { no: 1, rather_no: 2, somewhat_no: 2, somewhat_yes: 15, rather_yes: 32, yes: 46, none: 3 },
      },
      {
        label: 'Ich kann für mich den Begriff Ethik definieren.',
        values: { no: 2, rather_no: 3, somewhat_no: 15, somewhat_yes: 24, rather_yes: 33, yes: 23, none: 1 },
      },
    ];

    /*  3. Legende rendern  */

    const legendEl = document.getElementById('ethikLegend');
    if (legendEl) {
      legendEl.innerHTML = CATEGORIES.map(c => `
        <div class="ethik-legend-item">
          <div class="ethik-legend-swatch" style="background:${c.color}"></div>
          <span>${c.label}</span>
        </div>`).join('');
    }

    /*  4. Balken rendern  */
    
    const chartEl = document.getElementById('ethikChart');
    if (!chartEl) return;

    ROWS.forEach((row, i) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'ethik-row';
      rowEl.setAttribute('role', 'listitem');
      rowEl.style.transitionDelay = `${i * 60}ms`;   /* gestaffelter Einzug */

      const segments = CATEGORIES.map(c => {
        const pct = row.values[c.key] ?? 0;
        return `<div
          class="ethik-bar-segment"
          data-pct="${pct}"
          data-label="${c.label}"
          data-key="${c.key}"
          style="background:${c.color}; width:0%"
          title="${c.label}: ${pct} %"
          aria-label="${c.label}: ${pct} %"
        ></div>`;
      }).join('');

      rowEl.innerHTML = `
        <div class="ethik-row-label">${row.label}</div>
        <div class="ethik-bar" role="img" aria-label="${row.label}">${segments}</div>
      `;
      chartEl.appendChild(rowEl);
    });

    /*  5. Intersection Observer → Scrollytelling  */
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const row = entry.target;
          row.classList.add('visible');

          /* Balken auf echte Breite animieren */
          row.querySelectorAll('.ethik-bar-segment').forEach(seg => {
            seg.style.width = seg.dataset.pct + '%';
          });

          observer.unobserve(row);
        }
      });
    }, { threshold: 0.2 });

    chartEl.querySelectorAll('.ethik-row').forEach(row => observer.observe(row));

  })();
  </script>

</section>
